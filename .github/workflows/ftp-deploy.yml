name: Build ja FTP-deploy keila.advent.ee

on:
  # Iga muudatus main harus ehitatakse ja deployitakse kohe FTP kaudu keila.advent.ee serverisse.
  push:
    branches:
      - main

  # Igapäevane automaatne uuendus (Drive'i pildid, Sheetsi kogunemised, advent.ee audio).
  # Cron on UTC ajas. 01:00 UTC = Eesti aeg 03:00 (suvel) / 02:00 (talvel).
  schedule:
    - cron: '0 1 * * *'

  # Lubab käivitada käsitsi Actions tabist.
  workflow_dispatch:

# Korraga jookseb ainult üks FTP-deploy. Uus käivitus ootab eelmise lõppu ära,
# et kaks deployd ei kirjutaks serverisse korraga.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ftp-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Lae repo alla.
      - name: Checkout repository
        uses: actions/checkout@v5

      # Node.js 22 + npm cache.
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      # Sõltuvused täpselt package-lock.json järgi.
      - name: Install dependencies
        run: npm ci

      # Drive-piltide cache, et mitte iga kord kõike uuesti alla laadida.
      - name: Restore Drive image cache
        uses: actions/cache@v4
        with:
          path: public/koduka
          key: drive-images-ftp-${{ github.run_id }}
          restore-keys: drive-images-ftp-

      # Ehita leht. prebuild hook tõmbab värske info Drive'ist, Sheetsist,
      # advent.ee-st ja Facebooki postitustest.
      # SITE_URL paneb sitemap'i ja kanoonilised lingid keila.advent.ee peale.
      # GH_TOKEN võimaldab sync-facebook.mjs-il salvestada uuendatud Facebook
      # tokeni tagasi FB_PAGE_TOKEN secret'iks, kui see hakkab aeguma.
      - name: Build site
        run: npm run build
        env:
          DRIVE_API_KEY: ${{ secrets.DRIVE_API_KEY }}
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          FB_APP_ID: ${{ secrets.FB_APP_ID }}
          FB_APP_SECRET: ${{ secrets.FB_APP_SECRET }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
          SITE_URL: https://keila.advent.ee

      # Lae dist/ FTP serverisse. Action peab arvet serveri olekust ja laeb üles
      # AINULT muutunud failid (võrdleb .ftp-deploy-sync-state.json failiga serveris).
      - name: FTP deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # Kaust, kust laetakse (build väljund). Peab lõppema kaldkriipsuga.
          local-dir: ./dist/
          # Kaust serveris, kuhu leht läheb. Muuda vajadusel, nt: public_html/ või www/ või htdocs/
          # Peab lõppema kaldkriipsuga.
          server-dir: ./
          # Tavaline FTP (port 21). Kui host hakkab nõudma krüpteeritud ühendust,
          # eemalda allolevatelt ridadelt kommentaar:
          # protocol: ftps
          # port: 21
          # Ära lae üles versioonihalduse ega sõltuvuste faile.
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
