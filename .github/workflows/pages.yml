name: Deploy Astro site to GitHub Pages

on:
  # Build and deploy the site whenever changes land on main.
  push:
    branches:
      - main

  # Allow a manual deploy from the Actions tab if needed.
  workflow_dispatch:

permissions:
  # Read repository contents during checkout.
  contents: read
  # Publish the uploaded artifact to GitHub Pages.
  pages: write
  # Authenticate the deployment with GitHub's OIDC token.
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Download the repository so dependencies can be installed and the site can be built.
      - name: Checkout repository
        uses: actions/checkout@v4

      # Use Node.js 22 and cache npm dependencies between builds.
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # Configure GitHub Pages metadata for this deployment.
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      # Install exactly the dependency versions recorded in package-lock.json.
      - name: Install dependencies
        run: npm ci

      # Restore cached Drive images to avoid re-downloading unchanged files.
      # Key includes run_id so each run saves a fresh cache entry (with any
      # newly downloaded images). restore-keys falls back to the most recent
      # matching entry so unchanged files are always found on disk.
      - name: Restore Drive image cache
        uses: actions/cache@v4
        with:
          path: public/koduka
          key: drive-images-${{ github.run_id }}
          restore-keys: drive-images-

      # Build the Astro site into the dist folder.
      - name: Build site
        run: npm run build
        env:
          DRIVE_API_KEY: ${{ secrets.DRIVE_API_KEY }}

      # Upload dist as the Pages artifact that the deploy job will publish.
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # Publish the uploaded dist artifact to GitHub Pages.
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
