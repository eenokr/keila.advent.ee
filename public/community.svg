<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4B5A0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C9A690;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="400" height="500" fill="url(#bgGrad)"/>
  
  <!-- Decorative elements -->
  <circle cx="200" cy="100" r="40" fill="#8B4513" opacity="0.3"/>
  <circle cx="80" cy="200" r="30" fill="#8B4513" opacity="0.2"/>
  <circle cx="320" cy="300" r="35" fill="#8B4513" opacity="0.25"/>
  
  <!-- People silhouettes -->
  <g opacity="0.6" fill="#333">
    <!-- Person 1 -->
    <circle cx="100" cy="150" r="15"/>
    <path d="M 100 170 Q 85 180 75 210 M 100 170 Q 115 180 125 210" stroke="#333" stroke-width="8" fill="none" stroke-linecap="round"/>
    <path d="M 85 180 L 75 240 M 115 180 L 125 240" stroke="#333" stroke-width="8" stroke-linecap="round"/>
    
    <!-- Person 2 -->
    <circle cx="200" cy="140" r="18"/>
    <path d="M 200 165 Q 180 175 165 210 M 200 165 Q 220 175 235 210" stroke="#333" stroke-width="10" fill="none" stroke-linecap="round"/>
    <path d="M 180 175 L 165 250 M 220 175 L 235 250" stroke="#333" stroke-width="10" stroke-linecap="round"/>
    
    <!-- Person 3 -->
    <circle cx="300" cy="155" r="16"/>
    <path d="M 300 175 Q 280 185 265 220 M 300 175 Q 320 185 335 220" stroke="#333" stroke-width="9" fill="none" stroke-linecap="round"/>
    <path d="M 280 185 L 265 245 M 320 185 L 335 245" stroke="#333" stroke-width="9" stroke-linecap="round"/>
  </g>
  
  <!-- Text -->
  <text x="200" y="400" font-size="36" font-weight="bold" text-anchor="middle" fill="#333" font-family="Arial, sans-serif">Kogudus</text>
  <text x="200" y="450" font-size="18" text-anchor="middle" fill="#555" font-family="Arial, sans-serif" opacity="0.8">Keila Adventkogudus</text>
</svg>
