<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" width="300" height="400">
  <defs>
    <linearGradient id="workerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4B5A0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C9A690;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="300" height="400" fill="url(#workerGrad)"/>
  
  <!-- Decorative frame -->
  <rect x="20" y="20" width="260" height="360" fill="none" stroke="#8B4513" stroke-width="3" opacity="0.4" rx="10"/>
  
  <!-- Person silhouette -->
  <g opacity="0.7" fill="#333">
    <!-- Head -->
    <circle cx="150" cy="80" r="25"/>
    
    <!-- Body -->
    <path d="M 150 110 Q 130 140 125 180 M 150 110 Q 170 140 175 180" stroke="#333" stroke-width="12" fill="none" stroke-linecap="round"/>
    
    <!-- Arms -->
    <path d="M 130 130 L 80 160 M 170 130 L 220 160" stroke="#333" stroke-width="10" stroke-linecap="round"/>
    
    <!-- Legs -->
    <path d="M 125 180 L 120 280 M 175 180 L 180 280" stroke="#333" stroke-width="10" stroke-linecap="round"/>
    
    <!-- Feet -->
    <rect x="110" y="280" width="20" height="15" rx="3" fill="#333"/>
    <rect x="170" y="280" width="20" height="15" rx="3" fill="#333"/>
  </g>
  
  <!-- Badge/symbol -->
  <circle cx="240" cy="50" r="30" fill="#D4B5A0" stroke="#8B4513" stroke-width="2"/>
  <text x="240" y="60" font-size="32" font-weight="bold" text-anchor="middle" fill="#8B4513" font-family="Arial, sans-serif">+</text>
  
  <!-- Text -->
  <text x="150" y="350" font-size="28" font-weight="bold" text-anchor="middle" fill="#333" font-family="Arial, sans-serif">Töölane</text>
</svg>
